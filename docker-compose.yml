name: english-ai-tutor

services:
  backend:
    build:
      context: ./backend/src
      dockerfile: ../docker/Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
