  frontend_quality_and_tests:
    name: "[Frontend] Code quality and tests"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run "npm run lint"
        run: npm run lint

      - name: Run "npm audit"
        run: |
          npm audit --json \
            | jq -e '
                select(.type == "auditSummary")
                | .data.vulnerabilities
                | (.high // 0) + (.critical // 0) == 0
              ' > /dev/null

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.34.0
        with:
          version: v0.69.3
          scan-type: fs
          scan-ref: frontend
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Run tests
        run: npm run test:coverage
        env:
          CI: true

      - name: Coverage report
        uses: ArtiomTr/jest-coverage-report-action@v2
        if: always()
        with:
          coverage-file: ./frontend/coverage/coverage-summary.json
          base-coverage-file: ./frontend/coverage/coverage-summary.json
          working-directory: ./frontend
          package-manager: npm
          test-script: npm run test:coverage